version: '3.8'

services:
  mongodb:
    image: mongo:4.4.6
    container_name: mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./Application-Code/backend
      dockerfile: Dockerfile
    container_name: backend-api
    depends_on:
      - mongodb
    environment:
      - MONGO_CONN_STR=mongodb://mongodb:27017/todo?authSource=admin
      - MONGO_USERNAME=admin
      - MONGO_PASSWORD=password123
      - USE_DB_AUTH=true
      - PORT=3500
    ports:
      - "3500:3500"

  frontend:
    build:
      context: ./Application-Code/frontend
      dockerfile: Dockerfile
    container_name: frontend-web
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongo-data:
